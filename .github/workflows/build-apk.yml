name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: ./mobile-viz
        run: |
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest
          npm install

      - name: Prepare Web Directory
        working-directory: ./mobile-viz
        run: |
          mkdir -p www
          # Ensure index.html is in the right place for Capacitor sync
          cp www/index.html www/index.html || echo "File already there"

      - name: Add and Sync Android Platform
        working-directory: ./mobile-viz
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK with Gradle
        working-directory: ./mobile-viz/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: DaemonViz-AGI-v8
          path: mobile-viz/android/app/build/outputs/apk/debug/app-debug.apk
