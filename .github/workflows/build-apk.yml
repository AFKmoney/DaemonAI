name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./mobile-viz
        run: npm install

      - name: Initialize Capacitor Android
        working-directory: ./mobile-viz
        run: |
          mkdir -p www
          npx cap add android || echo "Android platform already added"
          npx cap sync android

      - name: Fix Gradle permissions
        working-directory: ./mobile-viz/android
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          build-root-directory: ./mobile-viz/android
          arguments: assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: DaemonViz-v8-Alpha
          path: mobile-viz/android/app/build/outputs/apk/debug/app-debug.apk
