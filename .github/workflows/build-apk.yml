name: Build and Release Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: ./mobile-viz
        run: |
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest
          npm install

      - name: Prepare Web Directory
        working-directory: ./mobile-viz
        run: mkdir -p www

      - name: Add and Sync Android Platform
        working-directory: ./mobile-viz
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK with Gradle
        working-directory: ./mobile-viz/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v8.0.${{ github.run_number }}
          name: Daemon AGI v8.0 Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: mobile-viz/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
