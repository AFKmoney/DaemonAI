name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies and init android
        working-directory: ./mobile-viz
        run: |
          npm install
          npx cap add android

      - name: Sync Capacitor
        working-directory: ./mobile-viz
        run: npx cap sync android

      - name: Build APK
        working-directory: ./mobile-viz/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: daemon-visualizer-apk
          path: mobile-viz/android/app/build/outputs/apk/debug/app-debug.apk
